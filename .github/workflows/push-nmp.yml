name: Manual NPM Publish

on:
  # 允许手动触发
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'NPM 发布标签 (例如: latest, beta, test)'
        required: true
        default: 'latest'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # checkout 步骤会自动切换到你运行 workflow 时选中的分支

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build --if-present

      - name: Run Tests
        run: npm run test --if-present

      - name: Publish to NPM
        # 使用 --tag 参数可以让你的测试版本不覆盖正式版
        # 例如选 test 标签，用户需通过 npm install pkg@test 安装
        run: npm publish --tag ${{ github.event.inputs.publish_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
